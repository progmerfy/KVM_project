services:
  app:
    build: .
    container_name: kvm-mgr-app
    volumes:
      # Mount code but exclude root-level libvirt.py stub (if any)
      - ./app:/app/app:rw
      - ./docs:/app/docs:ro
      - ./tests:/app/tests:rw
      - /var/run/libvirt:/var/run/libvirt:rw
      - /var/lib/libvirt/images:/var/lib/libvirt/images:rw
      - ./certs:/app/certs:ro
    ports:
      - "8000:8000"
      - "8443:8443"
    environment:
      - DEFAULT_HOST_URI=qemu:///system
      - SSL_KEY_FILE=/app/certs/kvm-mgr.key
      - SSL_CERT_FILE=/app/certs/kvm-mgr.crt
    command: uvicorn app.main:app --host 0.0.0.0 --port 8443

  tests:
    build: .
    container_name: kvm-mgr-tests
    volumes:
      - ./app:/app/app:rw
      - ./docs:/app/docs:ro
      - ./tests:/app/tests:rw
    depends_on:
      - app
    environment:
      - DEFAULT_HOST_URI=qemu:///system
    entrypoint: ["pytest", "-v"]
